name: Release

# Publishes to npm (with provenance) and creates a GitHub Release whenever a
# v* tag is pushed. Bump the version, tag it (e.g. `git tag v1.0.1`), push the
# tag, and this workflow does the rest.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC token for npm trusted publishing (auth + provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Make the published version match the tag (v1.0.1 -> 1.0.1) so the tag is
      # the single source of truth — no need to commit a version bump per release.
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # Auth via OIDC trusted publishing — no token stored anywhere. npm (>=11.5.1,
      # bundled with Node 24) exchanges the workflow's OIDC token for a short-lived
      # credential and attaches provenance automatically. Public access comes from
      # package.json "publishConfig". Requires a Trusted Publisher to be configured
      # for this package on npmjs.com (org jdempster, repo glotfile, workflow release.yml).
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
